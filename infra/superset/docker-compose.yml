services:
  superset-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf2-superset-init
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-in-prod}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME:-TF2}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME:-Admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade && \
        superset fab create-admin \
          --username "$$SUPERSET_ADMIN_USERNAME" \
          --firstname "$$SUPERSET_ADMIN_FIRSTNAME" \
          --lastname "$$SUPERSET_ADMIN_LASTNAME" \
          --email "$$SUPERSET_ADMIN_EMAIL" \
          --password "$$SUPERSET_ADMIN_PASSWORD" || true && \
        superset init
    restart: "no"

  superset:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf2-superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-in-prod}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8088/health', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    command:
      - /bin/sh
      - -c
      - superset run -h 0.0.0.0 -p 8088

  superset-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf2-superset-bootstrap
    environment:
      SUPERSET_BASE_URL: http://tf2-superset:8088
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_TRINO_SQLALCHEMY_URI: ${SUPERSET_TRINO_SQLALCHEMY_URI:-trino://trino@tf2-trino:8081/tf2/default}
      SUPERSET_QUERY_DIR: /workspace/trino-queries/dashboard
    volumes:
      - ./bootstrap_superset.py:/app/pythonpath/bootstrap_superset.py:ro
      - ../trino/queries:/workspace/trino-queries:ro
    depends_on:
      superset:
        condition: service_healthy
    command:
      - python
      - /app/pythonpath/bootstrap_superset.py
    restart: "no"

volumes:
  superset_home:

networks:
  default:
    name: logs-explorer
